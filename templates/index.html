<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Central dos Tênis</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0b1120;
    color:white;
}

/* HEADER */

header{
    width:100%;
    background:linear-gradient(90deg,#7c3aed,#2563eb);
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:1000;
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.logo{
    font-size:32px;
    font-weight:700;
}

.logo span{
    color:#22d3ee;
}

nav{
    display:flex;
    gap:25px;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:500;
    transition:0.3s;
}

nav a:hover{
    color:#22d3ee;
}

/* HERO */

.hero{
    height:500px;
    background:
    linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1470&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero-content h1{
    font-size:65px;
    margin-bottom:20px;
}

.hero-content p{
    font-size:22px;
    margin-bottom:30px;
    color:#d1d5db;
}

.hero-content button{
    padding:16px 35px;
    border:none;
    border-radius:50px;
    background:#22d3ee;
    color:#0f172a;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.hero-content button:hover{
    transform:scale(1.05);
}

/* MENU */

.container{
    display:flex;
    padding:30px;
    gap:30px;
}

.sidebar{
    width:320px;
    background:#111827;
    border-radius:20px;
    padding:25px;
    height:fit-content;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.sidebar h2{
    margin-bottom:15px;
    color:#22d3ee;
}

.sidebar input{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:12px;
    background:#1f2937;
    color:white;
}

.sidebar button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#22d3ee,#2563eb);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.sidebar button:hover{
    transform:translateY(-2px);
}

.status{
    margin-top:15px;
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    text-align:center;
    color:#22d3ee;
    font-weight:bold;
}

/* PRODUTOS */

.content{
    flex:1;
}

.topo-produtos{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.topo-produtos h1{
    font-size:40px;
}

.search{
    width:300px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

.card{
    background:#111827;
    border-radius:20px;
    overflow:hidden;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-info{
    padding:20px;
}

.card-info h3{
    font-size:24px;
    margin-bottom:10px;
}

.card-info p{
    color:#9ca3af;
    margin-bottom:12px;
}

.preco{
    color:#22d3ee;
    font-size:24px;
    font-weight:bold;
    margin-bottom:15px;
}

.card-info button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#10b981;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.card-info button:hover{
    background:#059669;
}

/* CARRINHO */

.carrinho{
    margin-top:40px;
    background:#111827;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.carrinho h2{
    margin-bottom:20px;
}

.item{
    background:#1f2937;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
}

.total{
    margin-top:20px;
    font-size:28px;
    color:#22d3ee;
    font-weight:bold;
}

.finalizar{
    width:100%;
    margin-top:20px;
    padding:16px;
    border:none;
    border-radius:15px;
    background:linear-gradient(90deg,#10b981,#059669);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

footer{
    margin-top:50px;
    padding:30px;
    text-align:center;
    background:#111827;
    color:#9ca3af;
}

@media(max-width:950px){

    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }

    .hero-content h1{
        font-size:45px;
    }

}

</style>
</head>

<body>

<header>

    <div class="logo">
        CENTRAL <span>DOS TÊNIS</span>
    </div>

    <nav>
        <a href="#">Início</a>
        <a href="#">Masculino</a>
        <a href="#">Feminino</a>
        <a href="#">Lançamentos</a>
        <a href="#">Promoções</a>
    </nav>

</header>

<section class="hero">

    <div class="hero-content">

        <h1>OS MELHORES TÊNIS ESTÃO AQUI</h1>

        <p>
            Nike, Adidas, Jordan, Puma e muito mais
        </p>

        <button>
            Comprar Agora
        </button>

    </div>

</section>

<div class="container">

    <div class="sidebar">

        <h2>Criar Conta</h2>

        <input type="text" id="nome" placeholder="Nome Completo">

        <input type="email" id="email" placeholder="E-mail">

        <input type="text" id="telefone" placeholder="Telefone">

        <input type="text" id="cidade" placeholder="Cidade">

        <input type="text" id="usuario" placeholder="Usuário">

        <input type="password" id="senha" placeholder="Senha">

        <button onclick="criarConta()">
            Criar Conta
        </button>

        <br><br>

        <h2>Login</h2>

        <input type="text" id="loginUsuario" placeholder="Usuário">

        <input type="password" id="loginSenha" placeholder="Senha">

        <button onclick="fazerLogin()">
            Entrar
        </button>

        <div class="status" id="status">
            Nenhum usuário logado
        </div>

        <br>

        <button onclick="exportarJSON()">
            📁 Exportar JSON
        </button>

    </div>

    <div class="content">

        <div class="topo-produtos">

            <h1>Lançamentos</h1>

            <input
            type="text"
            class="search"
            placeholder="Pesquisar tênis..."
            onkeyup="pesquisar(this.value)"
            >

        </div>

        <div class="cards" id="cards"></div>

        <div class="carrinho">

            <h2>🛒 Carrinho</h2>

            <div id="listaCarrinho"></div>

            <div class="total" id="total">
                Total: R$ 0.00
            </div>

            <button class="finalizar" onclick="finalizarCompra()">
                💳 Finalizar Compra
            </button>

        </div>

    </div>

</div>

<footer>
    © 2026 Central dos Tênis - Todos os direitos reservados
</footer>

<script>

const estoque = [

{
    marca:"Nike",
    modelo:"Air Max 90",
    preco:799.90,
    imagem:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1000"
},

{
    marca:"Nike",
    modelo:"Jordan 1",
    preco:999.90,
    imagem:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=1000"
},

{
    marca:"Adidas",
    modelo:"Ultraboost",
    preco:699.90,
    imagem:"https://images.unsplash.com/photo-1543508282-6319a3e2621f?q=80&w=1000"
},

{
    marca:"Puma",
    modelo:"RS-X",
    preco:450.00,
    imagem:"https://images.unsplash.com/photo-1608231387042-66d1773070a5?q=80&w=1000"
},

{
    marca:"Vans",
    modelo:"Old Skool",
    preco:399.90,
    imagem:"https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?q=80&w=1000"
},

{
    marca:"Jordan",
    modelo:"Jordan 4 Retro",
    preco:1799.90,
    imagem:"https://images.unsplash.com/photo-1552346154-21d32810aba3?q=80&w=1000"
}

];

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

let carrinho = [];

let usuarioLogado = null;

function mostrarProdutos(lista = estoque){

    const cards = document.getElementById("cards");

    cards.innerHTML = "";

    lista.forEach((tenis,index)=>{

        cards.innerHTML += `

        <div class="card">

            <img src="${tenis.imagem}">

            <div class="card-info">

                <h3>${tenis.marca}</h3>

                <p>${tenis.modelo}</p>

                <div class="preco">
                    R$ ${tenis.preco.toFixed(2)}
                </div>

                <button onclick="adicionarCarrinho(${index})">
                    Adicionar ao Carrinho
                </button>

            </div>

        </div>

        `;

    });

}

function pesquisar(valor){

    const filtrado = estoque.filter(tenis =>

        tenis.marca.toLowerCase().includes(valor.toLowerCase()) ||

        tenis.modelo.toLowerCase().includes(valor.toLowerCase())

    );

    mostrarProdutos(filtrado);

}

function criarConta(){

    const nome = document.getElementById("nome").value;
    const email = document.getElementById("email").value;
    const telefone = document.getElementById("telefone").value;
    const cidade = document.getElementById("cidade").value;
    const usuario = document.getElementById("usuario").value;
    const senha = document.getElementById("senha").value;

    if(
        nome == "" ||
        email == "" ||
        telefone == "" ||
        cidade == "" ||
        usuario == "" ||
        senha == ""
    ){

        alert("Preencha todos os campos!");
        return;

    }

    usuarios.push({
        nome,
        email,
        telefone,
        cidade,
        usuario,
        senha
    });

    localStorage.setItem(
        "usuarios",
        JSON.stringify(usuarios)
    );

    alert("Conta criada com sucesso!");

}

function fazerLogin(){

    const usuario =
    document.getElementById("loginUsuario").value;

    const senha =
    document.getElementById("loginSenha").value;

    const encontrado = usuarios.find(u =>

        u.usuario == usuario &&
        u.senha == senha

    );

    if(encontrado){

        usuarioLogado = encontrado;

        document.getElementById("status").innerHTML =
        `👤 ${encontrado.nome}`;

        alert("Login realizado!");

    }

    else{

        alert("Usuário ou senha incorretos!");

    }

}

function adicionarCarrinho(index){

    if(usuarioLogado == null){

        alert("Faça login primeiro!");
        return;

    }

    carrinho.push(estoque[index]);

    atualizarCarrinho();

}

function atualizarCarrinho(){

    const lista =
    document.getElementById("listaCarrinho");

    lista.innerHTML = "";

    let total = 0;

    carrinho.forEach((item)=>{

        total += item.preco;

        lista.innerHTML += `

        <div class="item">

            ${item.marca} - ${item.modelo}

            | R$ ${item.preco.toFixed(2)}

        </div>

        `;

    });

    document.getElementById("total").innerHTML =

    `Total: R$ ${total.toFixed(2)}`;

}

function finalizarCompra(){

    if(carrinho.length == 0){

        alert("Carrinho vazio!");
        return;

    }

    alert("Compra finalizada com sucesso!");

    carrinho = [];

    atualizarCarrinho();

}

function exportarJSON(){

    const dados = {

        usuarios:usuarios,
        carrinho:carrinho

    };

    const texto =
    JSON.stringify(dados,null,4);

    const blob = new Blob([texto],{

        type:"application/json"

    });

    const link =
    document.createElement("a");

    link.href =
    URL.createObjectURL(blob);

    link.download =
    "backup_loja.json";

    link.click();

}

mostrarProdutos();

</script>

</body>
</html>
